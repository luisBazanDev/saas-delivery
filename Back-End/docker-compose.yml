services:
  db:
    image: mysql:latest
    container_name: saas-delivery-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ${DB_NAME:-saas_delivery}
      MYSQL_USER: ${DB_USER:-saas_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-saas_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
